<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pokemon Team Builder</title>
</head>
<body>

  <h1>Pokemon Team Builder</h1>

  <label for="pokeInput">Name or ID</label>
  <input id="pokeInput" type="text" />
  <button id="btnLoad" type="button">Find</button>

  <div id="err" style="color:red;"></div>
  <div id="status" style="color:#666;"></div>

  <div id="resultPanel" hidden>
    <h2 id="pokeTitle"></h2>

    <img id="pokeImg" width="160" height="160" alt="Pokemon Image" />

    <br><br>

    <audio id="pokeAudio" controls></audio>

    <br><br>

    <select id="move1"></select>
    <select id="move2"></select>
    <select id="move3"></select>
    <select id="move4"></select>

    <br><br>

    <button id="btnAdd" type="button">Add to Team</button>
  </div>

  <h2>Your Team</h2>
  <div id="teamList"></div>

  <!-- JS MUST LOAD AFTER ELEMENTS -->
  <script src="pokemon.js" defer></script>
</body>
</html>
